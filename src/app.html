<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Set theme before paint: saved choice, else OS preference (no flash) -->
    <script>
      (() => {
        const saved = localStorage.getItem("theme");
        const dark =
          saved === "dark" ||
          (!saved && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />

    <!-- Preload primary font to reduce layout shift -->
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/inter.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Default title/description, overridden per-page via <svelte:head> where present -->
    <title>Ran Wright - AI & Data Platform Consultant</title>

    <meta
      name="description"
      content="Ran Wright helps businesses turn complex data and AI challenges into scalable, production-ready systems. AI strategy, data platform architecture, MLOps, and cloud consulting."
    />

    <meta
      name="keywords"
      content="Ran Wright, AI consultant, data platform architecture, MLOps, AIOps, cloud infrastructure, DevOps automation"
    />

    <!-- Open Graph Tags for Social Media -->
    <meta
      property="og:title"
      content="Ran Wright - AI & Data Platform Consultant"
    />
    <meta
      property="og:description"
      content="AI strategy, data platform architecture, and MLOps consulting for businesses."
    />
    <!-- TODO: set og:url once the final custom domain is chosen -->
    <meta property="og:type" content="website" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ran Wright - AI & Data Platform Consultant"
    />
    <meta
      name="twitter:description"
      content="AI strategy, data platform architecture, and MLOps consulting for businesses."
    />

    <!-- SvelteKit head injection -->
    %sveltekit.head%
  </head>

  <body>
    <div>%sveltekit.body%</div>
  </body>
</html>
